<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1f1a"/>
      <stop offset="1" stop-color="#123a2e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9adbc0"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e07a7a"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title block -->
  <text x="80" y="110" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30" fill="#9adbc0" letter-spacing="6">OAUTH 2.0 SECURITY</text>
  <text x="80" y="185" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#f2f7f4">RFC 9207 與 Mix-Up 攻擊</text>
  <text x="80" y="240" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="30" fill="#c9ddd3">用一個 iss 參數，堵住 MCP 多授權伺服器時代的身分混淆</text>

  <!-- Diagram -->
  <!-- MCP Client -->
  <rect x="80" y="330" width="260" height="110" rx="14" fill="#1c4a3a" stroke="#9adbc0" stroke-width="2"/>
  <text x="210" y="378" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#f2f7f4" text-anchor="middle">MCP Client</text>
  <text x="210" y="412" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="20" fill="#c9ddd3" text-anchor="middle">同時對接多個 AS</text>

  <!-- Evil AS -->
  <rect x="760" y="280" width="340" height="100" rx="14" fill="#4a1c1c" stroke="#e07a7a" stroke-width="2"/>
  <text x="930" y="322" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#f7eaea" text-anchor="middle">惡意授權伺服器</text>
  <text x="930" y="356" font-family="Menlo, monospace" font-size="19" fill="#e8b3b3" text-anchor="middle">callback?code=…（沒有來源）</text>

  <!-- Honest AS -->
  <rect x="760" y="430" width="340" height="100" rx="14" fill="#1c4a3a" stroke="#9adbc0" stroke-width="2"/>
  <text x="930" y="472" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#f2f7f4" text-anchor="middle">合法授權伺服器</text>
  <text x="930" y="506" font-family="Menlo, monospace" font-size="19" fill="#9adbc0" text-anchor="middle">callback?code=…&amp;iss=✓</text>

  <!-- Arrows -->
  <line x1="345" y1="360" x2="750" y2="325" stroke="#e07a7a" stroke-width="3" stroke-dasharray="10 7" marker-end="url(#arrowRed)"/>
  <line x1="345" y1="410" x2="750" y2="470" stroke="#9adbc0" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="545" y="318" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="20" fill="#e8b3b3" text-anchor="middle">來源無法辨識 → mix-up</text>
  <text x="545" y="475" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="20" fill="#9adbc0" text-anchor="middle">iss 嚴格比對 → 攻擊中斷</text>

  <!-- Footer -->
  <text x="80" y="580" font-family="Menlo, monospace" font-size="22" fill="#7fa896">blog.wu-boy.com · RFC 9207 · MCP Authorization</text>
</svg>
